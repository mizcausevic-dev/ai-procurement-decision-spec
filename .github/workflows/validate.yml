name: Validate examples

# Validates every JSON document under examples/ against the Suite schemas via
# kg-validate-action. Each example must carry decision_card_version at the top
# level to be matched; the action then runs ajv against the bundled schema.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-examples:
    name: Validate against Kinetic Gain Protocol Suite schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mizcausevic-dev/kg-validate-action@v0.1.1
        with:
          files: 'examples/**/*.json'
